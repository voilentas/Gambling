    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Affiliates (static mock)</title>
    <style>
      :root{
        --border:rgba(255,255,255,.08);
        --text:rgba(255,255,255,.92);
        --muted:rgba(255,255,255,.60);
        --muted2:rgba(255,255,255,.42);
        --green:#27c46b;
        --orange:#ea7b2e;
        --orange2:#c96020;
        --shadow:0 16px 36px rgba(0,0,0,.45);
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
        background:#05070a;
        color:var(--text);
        overflow:hidden;
        position:relative;
      }
      body::before{
        content:"";
        position:fixed;
        inset:0;
        background: url("./assets/bg.jpg") center/cover no-repeat;
        filter: blur(12px) brightness(0.45);
        transform: scale(1.06);
        z-index:-2;
      }
      body::after{
        content:"";
        position:fixed;
        inset:0;
        background:
          radial-gradient(1200px 700px at 55% 42%, rgba(255,255,255,.06), rgba(255,255,255,0) 55%),
          radial-gradient(900px 500px at 65% 58%, rgba(234,123,46,.18), rgba(234,123,46,0) 55%),
          linear-gradient(180deg, rgba(5,7,10,.65), rgba(7,10,15,.88) 55%, rgba(6,8,11,.92));
        z-index:-1;
      }
      .topbar{
        position:sticky;top:0;z-index:10;height:56px;display:flex;align-items:center;
        border-bottom:1px solid var(--border);
        background: rgba(7,10,15,.85);
        backdrop-filter: blur(10px);
      }
      .topbar .inner{width:100%;max-width:none;margin:0;padding:0 10px;display:flex;align-items:center;gap:18px}
      .brand{display:flex;align-items:center;user-select:none;white-space:nowrap}
      .brand img{height:28px;width:auto;display:block;object-fit:contain;filter: drop-shadow(0 2px 10px rgba(0,0,0,.55))}
      @media (min-width: 768px){ .brand img{height:44px} }
      .nav{display:flex;align-items:center;gap:18px;font-size:13px;color:var(--muted);flex:1;overflow:hidden}
      .nav a{color:inherit;text-decoration:none;padding:6px 2px}
      .nav a.active{color:var(--text)}
      .nav a:hover{color:rgba(255,255,255,.80)}
      .actions{display:flex;align-items:center;gap:10px}
      .btn{height:28px;padding:0 12px;border-radius:999px;border:1px solid transparent;display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;cursor:pointer;user-select:none}
      .btn.green{background: rgba(39,196,107,.95);color:#07120b;box-shadow:0 10px 22px rgba(39,196,107,.18)}
      .btn.orange{background: linear-gradient(135deg, var(--orange), var(--orange2));color:#fff;box-shadow:0 10px 22px rgba(234,123,46,.18)}
      .rbx{width:14px;height:14px;display:inline-block}
      .rbx svg{width:14px;height:14px;display:block}

      .layout{height: calc(100vh - 56px);display:flex;gap:14px;padding:12px 12px 14px}
      .main{flex:1;border:1px solid var(--border);border-radius: 12px;background: radial-gradient(900px 500px at 45% 55%, rgba(255,255,255,.06), rgba(255,255,255,0) 55%), linear-gradient(180deg, rgba(10,14,18,.88), rgba(8,10,13,.82));box-shadow: var(--shadow);overflow:hidden}
      .mainInner{height:100%;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
      h1{margin:0;font-size:26px;font-weight:900;letter-spacing:.2px}
      .card{border:1px solid rgba(255,255,255,.10);background: rgba(255,255,255,.03);border-radius:14px;padding:14px}
      .row{display:flex;gap:12px;flex-wrap:wrap}
      .pill{background: rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:6px 10px;border-radius:999px;color:rgba(255,255,255,.72);font-weight:800;font-size:11px}
      .input{height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.10);background: rgba(0,0,0,.18);color:rgba(255,255,255,.86);padding:0 10px;min-width:280px;outline:none}
      .input::placeholder{color:rgba(255,255,255,.35)}
      .btnBig{height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.10);padding:0 14px;background: linear-gradient(135deg, var(--orange), var(--orange2));color:white;font-weight:900;font-size:12px;cursor:pointer}

      @media (max-width: 720px){ .nav{display:none;} }
    </style>

  <body>
    <header class="topbar">
      <div class="inner">
        <a class="brand" aria-label="Beancan.gg" href="http://localhost:8000/coinflip_fixed.html"><img src="./Affiliates (static mock)_files/logo.webp" alt="Beancan.gg"></a>
        <nav class="nav" aria-label="Primary">
          <a href="http://localhost:8000/coinflip_fixed.html">Coinflip</a>
          <a href="http://localhost:8000/jackpot_fixed.html?tier=low">Jackpot Low</a>
          <a href="http://localhost:8000/jackpot_fixed.html?tier=high">Jackpot High</a>
          <a href="http://localhost:8000/upgrader_fixed.html">Upgrader</a>
          <a href="http://localhost:8000/bang_fixed.html">Bang</a>
          <a class="active" href="http://localhost:8000/affiliates_fixed.html">Affiliates</a>
          <a href="http://localhost:8000/faq_fixed.html" style="opacity:.75">FAQ</a>
          <a href="http://localhost:8000/leaderboard_fixed.html" style="opacity:.75">Leaderboard</a>
        </nav>
        <div class="actions">
          <button class="btn green" type="button">Free Coinflip</button>
          <button class="btn orange" type="button" aria-label="Sign in">
            <span class="rbx" aria-hidden="true">
              <svg viewBox="0 0 100 100" fill="none">
                <rect x="22" y="22" width="56" height="56" transform="rotate(45 50 50)" fill="rgba(255,255,255,.92)"></rect>
                <rect x="44" y="44" width="12" height="12" transform="rotate(45 50 50)" fill="rgba(234,123,46,.95)"></rect>
              </svg>
            </span>
            Sign in
          </button>
        </div>
      </div>
    </header>

    <div class="layout">
      <main class="main">
        <div class="mainInner">
          <div class="card">
            <h1>Affiliates</h1>
            <div style="margin-top:6px;color:rgba(255,255,255,.55);font-size:12px">
              This is a static mock page. Hook it up to your backend to generate real referral codes.
            </div>
          </div>

          <div class="row">
            <div class="card" style="flex:1;min-width:320px">
              <div style="font-weight:900">Your referral link</div>
              <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
                <input class="input" readonly="" value="https://beancan.gg/?ref=YOURCODE">
                <button class="btnBig" type="button">Copy</button>
              </div>
              <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
                <span class="pill">Revenue share</span>
                <span class="pill">Tracking</span>
                <span class="pill">Payouts</span>
              </div>
            </div>
            <div class="card" style="flex:1;min-width:320px">
              <div style="font-weight:900">Stats</div>
              <div style="margin-top:10px;color:rgba(255,255,255,.65);font-size:12px;line-height:1.6">
                Clicks: <strong>0</strong><br>
                Signups: <strong>0</strong><br>
                Earnings: <strong>$0.00</strong>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
